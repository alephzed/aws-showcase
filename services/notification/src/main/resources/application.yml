spring:
  application:
    name: notification

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

app:
  aws:
    region: ${AWS_REGION:us-east-2}
  sqs:
    queue-url: ${NOTIFICATION_QUEUE_URL}
    poll-delay-ms: 1000
