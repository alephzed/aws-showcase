spring:
  application:
    name: scheduling
  # Datasource is supplied at runtime via SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD
  # (injected by ECS from Secrets Manager). No credentials in source.
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

app:
  aws:
    region: ${AWS_REGION:us-east-2}
  eventbridge:
    bus-name: ${EVENTBRIDGE_BUS_NAME:scheduling-bus}
